version: "3.9"

# ── Risk Assessment Engine — Full Stack ────────────────────────────────────
# Start everything: docker-compose up --build
# Reset to clean state: docker-compose down -v && docker-compose up --build

services:

  # ── PostgreSQL 15 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: risk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-riskdb}
      POSTGRES_USER:     ${POSTGRES_USER:-riskuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-riskpass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-riskuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: risk_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: risk_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL:        jdbc:postgresql://postgres:5432/${POSTGRES_DB:-riskdb}
      DB_DRIVER:     org.postgresql.Driver
      DB_USERNAME:   ${POSTGRES_USER:-riskuser}
      DB_PASSWORD:   ${POSTGRES_PASSWORD:-riskpass}
      REDIS_HOST:    redis
      REDIS_PORT:    6379
      JWT_SECRET:    ${JWT_SECRET:-changeme_use_a_long_random_string_here}
      JWT_EXPIRATION: 86400000
      MAIL_HOST:     ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT:     ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-noreply@example.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── Python AI Service ──────────────────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: risk_ai
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-your_groq_api_key_here}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── React Frontend (Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: risk_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
