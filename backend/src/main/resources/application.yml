server:
  port: 8080

spring:
  application:
    name: backend

  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: jdbc:h2:mem:riskdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:

      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
      ddl-auto: update
    show-sql: true


  cache:
    type: redis

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 600000

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:test@gmail.com}
    password: ${MAIL_PASSWORD:test123}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jackson:
    serialization:
      indent-output: true

jwt:

  secret: ${JWT_SECRET:mysecretkey123456789012345678901234567890}
  expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

  secret: ${JWT_SECRET:mysecretkey123456789}
  expiration: ${JWT_EXPIRATION:86400000}

